version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: qlens-postgres
    environment:
      POSTGRES_USER: qlens
      POSTGRES_PASSWORD: qlens_dev_password_2026
      POSTGRES_DB: qlens_ai
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U qlens']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: qlens-redis
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
